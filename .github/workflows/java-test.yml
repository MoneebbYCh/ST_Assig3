name: Java CI with MySQL Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: monemonemone
          MYSQL_DATABASE: softwaretesting
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pmonemonemone || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Verify MySQL container health
      run: |
        echo "Waiting for MySQL to become healthy..."
        for i in {1..30}; do
          if docker inspect --format='{{json .State.Health.Status}}' $(docker ps -q --filter "name=mysql") | grep -q '"healthy"'; then
            echo "MySQL is healthy!"
            break
          fi
          echo "Waiting for MySQL..."
          sleep 2
        done

    - name: Set up MySQL database
      run: |
        sudo apt-get update && sudo apt-get install -y mysql-client
        mysql -h 127.0.0.1 -P 3306 -u root -pmonemonemone -e "CREATE DATABASE IF NOT EXISTS softwaretesting;"
        mysql -h 127.0.0.1 -P 3306 -u root -pmonemonemone softwaretesting -e "CREATE TABLE IF NOT EXISTS User (Email VARCHAR(255) PRIMARY KEY, Name VARCHAR(255));"
        mysql -h 127.0.0.1 -P 3306 -u root -pmonemonemone softwaretesting -e "INSERT INTO User (Email, Name) VALUES ('johndoe@example.com', 'John Doe');"

    - name: Compile Java Code
      run: javac -d . LoginApp.java test/LoginAppTest.java

    - name: Run Tests
      run: java -cp .:junit-5.8.2.jar:hamcrest-2.2.jar org.junit.platform.console.ConsoleLauncher --select-class test.LoginAppTest
